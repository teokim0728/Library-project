<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel = "icon" href = "{{ url_for('static', filename = 'images/icon.ico') }}" type = "image/x-icon">
    <title>Reassign Barcode</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(to bottom right, #004d40, #b2dfdb);
        }

        .container {
            width: 80%;
            max-width: 1600px;
            background-color: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            margin: auto;
            box-sizing: border-box;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background-color: white;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
            vertical-align: middle;
        }

        th {
            background-color: #f2f2f2;
            color: #333;
            font-weight: bold;
            white-space: nowrap;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tr:hover {
            background-color: #e8f5e9;
        }

        table input[type="text"] {
            width: 100%;
            padding: 10px;
            margin: 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-family: Georgia, serif;
            font-size: 15px;
        }

        /* Action buttons */
        table button {
            padding: 8px 16px;
            margin: 0 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-family: Georgia, serif;
        }

        table button[name="action"][value="update"] {
            background-color: #004d40;
            color: white;
        }

        table button[name="action"][value="update"]:hover {
            background-color: #00332a;
        }

        table button[name="action"][value="delete"] {
            background-color: #a00;
            color: white;
        }

        table button[name="action"][value="delete"]:hover {
            background-color: #800;
        }

        input[type="text"], input[type="password"] {
            width: calc(100% - 20px);
            padding: 12px;
            margin: 12px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-family: Georgia, serif;
            font-size: 15px;
        }

        input[type="submit"] {
            width: calc(100% - 20px);
            padding: 12px;
            margin: 10px 0;
            background-color: #004d40;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: Georgia, serif;
            font-size: 16px;
        }

        input[type="submit"]:hover {
            background-color: #00332a;
        }

        p {
            font-family: Georgia, serif;
            margin-top: 10px;
        }

        .error {
            color: #a00;
            font-weight: bold;
        }

        .success {
            color: #0a0;
            font-weight: bold;
        }

        h2, h3 {
            margin-bottom: 15px;
            color: #004d40;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Manage Students</h2>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
        {% if message %}
            <p class="success">{{ message }}</p>
        {% endif %}

        <h3>Current students</h3>
        <table>
            <tr>
                <th>Barcode</th>
                <th>First name</th>
                <th>Last name</th>
                <th>Email</th>
                <th>Actions</th>
            </tr>
            {% for s in students %}
            <tr>
                <td>
                    <input form="form-{{ loop.index }}" type="text" name="barcode" value="{{ s.barcode }}" required>
                </td>
                <td>
                    <input form="form-{{ loop.index }}" type="text" name="first" value="{{ s.first }}" required>
                </td>
                <td>
                    <input form="form-{{ loop.index }}" type="text" name="last" value="{{ s.last }}" required>
                </td>
                <td>
                    <input form="form-{{ loop.index }}" type="text" name="email" value="{{ s.email }}" required>
                </td>
                <td>
                    <form id="form-{{ loop.index }}" action="/reassign_barcode" method="post">
                        <input type="hidden" name="original_barcode" value="{{ s.barcode }}">
                        <button type="submit" name="action" value="update">Update</button>
                        <button type="submit" name="action" value="delete" onclick="return confirm('Delete student {{ s.first }} {{ s.last }}?');">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </table>

        <h3>Add a new student</h3>
        <form action="/reassign_barcode" method="post">
            <input type="hidden" name="action" value="add">
            <input type="text" name="barcode" placeholder="Barcode" required><br>
            <input type="text" name="first" placeholder="First name" required><br>
            <input type="text" name="last" placeholder="Last name" required><br>
            <input type="text" name="email" placeholder="Email" required><br>
            <input type="submit" value="Add student">
        </form>

        <h3>Quick barcode reassign</h3>
        <form action="/reassign_barcode" method="post">
            <input type="hidden" name="action" value="reassign">
            <input type="text" name="old_barcode" placeholder="Current barcode" required><br>
            <input type="text" name="new_barcode" placeholder="New barcode" required><br>
            <input type="submit" value="Reassign barcode">
        </form>

        <form action="/log" method="post">
            <input type="submit" value="Back to Log">
        </form>
    </div>
</body>
</html>
